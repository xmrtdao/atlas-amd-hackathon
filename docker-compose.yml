version: '3.8'
services:
  core:
    image: vllm/vllm-openai-rocm:v0.17.1
    container_name: atlas-core
    devices:
      - "/dev/kfd"
      - "/dev/dri"
    volumes:
      - "/mnt/scratch/models:/models"
      - "/mnt/atlas_data/adapters:/adapters"
    ports:
      - "8000:8000"
    command: >
      serve /models/dragon-llama-finance-8b
      --enable-lora 
      --lora-modules phi=/adapters/phi qwen=/adapters/qwen
      --gpu-memory-utilization 0.40

  router:
    image: ollama/ollama:rocm
    container_name: atlas-router
    devices:
      - "/dev/kfd"
      - "/dev/dri"
    volumes:
      - "/mnt/scratch/ollama:/root/.ollama"
    ports:
      - "11434:11434"

  vision:
    image: vllm/vllm-openai-rocm:v0.17.1
    container_name: atlas-vision
    devices:
      - "/dev/kfd"
      - "/dev/dri"
    volumes:
      - "/mnt/scratch/models:/models"
    ports:
      - "8002:8000"
    command: --model /models/InternVL2-40B --gpu-memory-utilization 0.40
