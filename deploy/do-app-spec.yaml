name: atlas-amd
region: atl
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  # /api/* → backend (DO strips /api, backend recibe /upload, /stats, etc.)
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /api
  # Todo lo demás → frontend Next.js
  - component:
      name: atlas-frontend
    match:
      path:
        prefix: /
services:
- name: atlas-amd-hackathon
  github:
    repo: rafaelcedilloav-eng/atlas-amd-hackathon
    branch: main
    deploy_on_push: true
  source_dir: /
  dockerfile_path: /Dockerfile
  http_port: 8000
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  envs:
  - key: VLLM_BASE_URL
    scope: RUN_AND_BUILD_TIME
    value: "http://129.212.191.212:8000/v1"
  - key: VLLM_MODEL
    scope: RUN_AND_BUILD_TIME
    value: "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
  - key: VLLM_TIMEOUT
    scope: RUN_AND_BUILD_TIME
    value: "30"
  - key: VLLM_MAX_TOKENS
    scope: RUN_AND_BUILD_TIME
    value: "3072"
  - key: VLLM_TEMPERATURE
    scope: RUN_AND_BUILD_TIME
    value: "0.1"
  - key: VLLM_API_KEY
    scope: RUN_AND_BUILD_TIME
    value: "not-needed"
  - key: SUPABASE_URL
    scope: RUN_AND_BUILD_TIME
    value: "https://fkjwaubqwvcereilllow.supabase.co"
  - key: SUPABASE_REST_API
    scope: RUN_AND_BUILD_TIME
    value: "https://fkjwaubqwvcereilllow.supabase.co/rest/v1/"
  - key: SUPABASE_SERVICE_KEY
    scope: RUN_AND_BUILD_TIME
    value: "SET_IN_DO_DASHBOARD"
  - key: SUPABASE_ANON_KEY
    scope: RUN_AND_BUILD_TIME
    value: "SET_IN_DO_DASHBOARD"
  - key: ATLAS_API_KEY
    scope: RUN_AND_BUILD_TIME
    value: "SET_IN_DO_DASHBOARD"
  - key: ATLAS_CORS_ORIGINS
    scope: RUN_AND_BUILD_TIME
    value: "https://atlas-hackathon.com,https://www.atlas-hackathon.com,https://atlas-amd-qs5g4.ondigitalocean.app"
  - key: ATLAS_DOCS_DIR
    scope: RUN_AND_BUILD_TIME
    value: "/tmp/atlas_uploads"
  - key: TESSERACT_CMD
    scope: RUN_AND_BUILD_TIME
    value: "/usr/bin/tesseract"
  - key: POPPLER_PATH
    scope: RUN_AND_BUILD_TIME
    value: "/usr/bin"
  - key: GOOGLE_CLOUD_PROJECT
    scope: RUN_AND_BUILD_TIME
    value: "SET_IN_DO_DASHBOARD"
  - key: GOOGLE_CLOUD_LOCATION
    scope: RUN_AND_BUILD_TIME
    value: "us-central1"
  - key: GOOGLE_SERVICE_ACCOUNT_JSON
    scope: RUN_AND_BUILD_TIME
    value: "SET_IN_DO_DASHBOARD"
  - key: LOG_LEVEL
    scope: RUN_AND_BUILD_TIME
    value: "INFO"
  - key: DEBUG
    scope: RUN_AND_BUILD_TIME
    value: "False"

- name: atlas-frontend
  github:
    repo: rafaelcedilloav-eng/atlas-amd-hackathon
    branch: main
    deploy_on_push: true
  source_dir: /frontend
  dockerfile_path: /frontend/Dockerfile
  http_port: 3000
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  envs:
  - key: NEXT_PUBLIC_API_URL
    scope: BUILD_TIME
    value: "https://atlas-amd-qs5g4.ondigitalocean.app/api"
  - key: NEXT_PUBLIC_API_KEY
    scope: BUILD_TIME
    value: "SET_IN_DO_DASHBOARD"
  - key: NEXT_PUBLIC_SUPABASE_URL
    scope: BUILD_TIME
    value: "https://fkjwaubqwvcereilllow.supabase.co"

alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
